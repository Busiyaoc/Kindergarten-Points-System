<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>班级积分系统（幼儿园版）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">星</div>
          <div>
            <h1>班级积分</h1>
            <p>幼儿园版</p>
          </div>
        </div>

        <form class="create-class" id="classForm">
          <label for="className">新建班级</label>
          <div class="inline-form">
            <input id="className" name="className" type="text" maxlength="24" placeholder="例如：小一班" required />
            <button type="submit" class="icon-button primary" title="新建班级" aria-label="新建班级">+</button>
          </div>
        </form>

        <div class="class-list" id="classList"></div>
      </aside>

      <main class="main">
        <section class="topbar" id="topbar"></section>

        <nav class="tabs" aria-label="系统模块">
          <button class="tab active" data-tab="students">幼儿积分</button>
          <button class="tab" data-tab="behaviors">行为规则</button>
          <button class="tab" data-tab="rewards">奖励商店</button>
          <button class="tab" data-tab="records">兑换记录</button>
        </nav>

        <section class="workspace" id="workspace"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js" defer></script>
  </body>
</html>
